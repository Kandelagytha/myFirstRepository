<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Rose Numerology</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Lora:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="side left-side"></div>
        <div class="middle-container">
            <h1>Blue Rose Numerology</h1>
            <p>Discover your destiny with Pythagorean Numerology. Enter your full name below to reveal your Expression and Soul Urge Numbers.</p>
            <form id="numerologyForm" onsubmit="calculateNumbers(event)">
                <input type="text" id="nameInput" placeholder="Enter your full name" required>
                <button type="submit" id="calculateButton">Calculate</button>
            </form>
            <div class="parchment" id="resultContainer">
                <div class="parchment-content" id="resultText"></div>
            </div>
            <footer class="autograph">
                <p>by Kandela Gytha Dharanawati, 2025</p>
                <p>Built with the help of Grok from xAI</p>
            </footer>
        </div>
        <div class="side right-side"></div>
    </div>
    <div class="lucky-number">088</div>
    <script src="script.js"></script>
</body>
</html>
